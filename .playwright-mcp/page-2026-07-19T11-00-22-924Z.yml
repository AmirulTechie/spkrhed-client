        - paragraph [ref=f3e460]: “A small bet that changeseverything.”
        - paragraph [ref=f3e461]: Most founders pass on the unglamorous move. The few who plant it own the channel everyone else ignored. For you, that is LinkedIn done right.
      - generic [ref=f3e463] [cursor=pointer]:
        - heading "The Beanstalk" [level=3] [ref=f3e466]: TheBeanstalk
        - paragraph [ref=f3e467]: “Watch it grow overnight.”
        - paragraph [ref=f3e468]: One system, planted once, that climbs on its own. Compounding conversations and steady upward momentum, a real pipeline instead of a monthly scramble.
      - generic [ref=f3e470] [cursor=pointer]:
        - heading "The Singing Harp" [level=3] [ref=f3e473]: The SingingHarp
        - paragraph [ref=f3e474]: “Content that calls them to you.”
        - paragraph [ref=f3e475]: The harp sang and people came. Your content does the same. Authority that pulls the right buyers toward you before you ever send a message.
      - generic [ref=f3e477] [cursor=pointer]:
