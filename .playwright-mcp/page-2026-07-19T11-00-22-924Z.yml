      - paragraph [ref=f3e96]: Inboxes full of fake personalization. Feeds full of automation pretending to be human. Buyers learned to tune all of it out, and most agencies answered by turning the volume up louder. We went the other way. Fewer messages, more meaning. We treat every conversation like it belongs to a real person, because it does. We measure success in relationships that compound, not blasts that burn out the moment they land.
      - paragraph [ref=f3e97]: This is bigger than any one campaign. Every founder who picks up this banner, who chooses the human path over the easy one, makes the movement stronger. That is who we build for. That is who we are.
