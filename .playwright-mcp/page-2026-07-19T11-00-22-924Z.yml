          - heading "Conscious Collaboration" [level=3] [ref=f3e741]
          - paragraph [ref=f3e742]: "01"
        - paragraph [ref=f3e743]: At SPKRHED, we treat active listening as a superpower. Understanding you, your buyer and your market is the cornerstone of every strategic decision we make and every word we send in your name.
        - blockquote [ref=f3e744]: “To learn through listening, practice it naively and actively. Naively means that you listen openly, ready to learn something. Listening actively means acknowledging what you hear and acting accordingly.”
        - paragraph [ref=f3e745]: Betsy Sanders, Nordstrom
      - generic [ref=f3e746]:
        - generic [ref=f3e747]:
          - heading "Purposeful Process" [level=3] [ref=f3e748]
          - paragraph [ref=f3e749]: "02"
        - paragraph [ref=f3e750]: We carry your message with exacting detail and deploy every tool in our arsenal to land it. Your core principles and your company culture are the foundation we build on, never an afterthought.
        - blockquote [ref=f3e751]: “It’s only when companies are clear about their purpose, have clearly communicated it, and are understood by the team that they can achieve both unity of effort and distributed decision-making.”
        - paragraph [ref=f3e752]: Marc Koehler
      - generic [ref=f3e753]:
        - generic [ref=f3e754]:
          - heading "Exceeded Expectations" [level=3] [ref=f3e755]
          - paragraph [ref=f3e756]: "03"
        - paragraph [ref=f3e757]: Your complete satisfaction is our first priority. In a world where attention is the whole game, we would rather build something genuinely worth talking about than shout about something that is not.
        - blockquote [ref=f3e758]: “In the old world, you devoted 30% of your time to building a great service and 70% of your time to shouting about it. In the new world, that inverts.”
        - paragraph [ref=f3e759]: Jeff Bezos
