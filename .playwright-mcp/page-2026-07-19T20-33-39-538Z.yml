    - generic [ref=f1e802]:
      - generic [ref=f1e805] [cursor=pointer]:
        - heading "The Cow" [level=3] [ref=f1e808]
        - paragraph [ref=f1e809]: “Stop trading your best hours for nothing.”
        - paragraph [ref=f1e810]: Cold calls, dead referrals, a site that just sits there. Most founders keep feeding their last good asset, their time, into channels that quit paying. That ends here.
      - generic [ref=f1e813] [cursor=pointer]:
        - heading "The Overnight Climb" [level=3] [ref=f1e816]
        - paragraph [ref=f1e817]: “It grows while you sleep.”
        - paragraph [ref=f1e818]: The system runs whether you are on a call, on a flight, or off the clock. Conversations get started and nurtured in the background, every single day.
      - generic [ref=f1e821] [cursor=pointer]:
        - heading "The Clouds" [level=3] [ref=f1e824]
        - paragraph [ref=f1e825]: “Your market is higher than you think.”
        - paragraph [ref=f1e826]: The buyers worth the most sit above where your competitors bother to look. We climb past the noise and start the conversations they never reach.
      - generic [ref=f1e829] [cursor=pointer]:
        - heading "The Treasure Room" [level=3] [ref=f1e832]
        - paragraph [ref=f1e833]: “The access is already yours.”
        - paragraph [ref=f1e834]: The opportunities you want are often one introduction deep inside networks you can already reach. We unlock what is sitting right there waiting.
      - generic [ref=f1e837] [cursor=pointer]:
        - heading "Fee-Fi-Fo-Fum" [level=3] [ref=f1e840]
        - paragraph [ref=f1e841]: “Loud is not the same as strong.”
        - paragraph [ref=f1e842]: Your noisiest competitors win on volume, not precision. A sharper message to the right person beats a louder one to everyone, every time.
      - generic [ref=f1e845] [cursor=pointer]:
        - heading "Jack’s Courage" [level=3] [ref=f1e848]
        - paragraph [ref=f1e849]: “Someone has to make the climb.”
        - paragraph [ref=f1e850]: Every result starts with the decision to go. We do not sell magic. We hand you the beans, then climb right alongside you.
